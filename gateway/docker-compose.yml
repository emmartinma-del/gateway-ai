services:
  gateway:
    build: .
    restart: unless-stopped
    environment:
      # Required — inject via .env or platform secrets manager
      WALLET_PRIVATE_KEY: ${WALLET_PRIVATE_KEY}
      NETWORK: ${NETWORK:-base}
      FEE_RECIPIENT_ADDRESS: ${FEE_RECIPIENT_ADDRESS}
      API_KEYS: ${API_KEYS}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS}
      MAX_PAYMENT_PER_REQUEST: ${MAX_PAYMENT_PER_REQUEST}
      MAX_DAILY_SPEND: ${MAX_DAILY_SPEND}
      # Optional
      GATEWAY_FEE_BPS: ${GATEWAY_FEE_BPS:-15}
      PORT: "3001"
    volumes:
      - gateway-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aiagentpay.rule=Host(`aiagentpay.cloud`)"
      - "traefik.http.routers.aiagentpay.entrypoints=websecure"
      - "traefik.http.routers.aiagentpay.tls.certresolver=letsencrypt"
      - "traefik.http.services.aiagentpay.loadbalancer.server.port=3001"

volumes:
  gateway-data:
